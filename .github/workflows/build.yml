name: Build Tauri AppImage

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libudev-dev patchelf libfuse2

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: apps/frontend/src-tauri

      - name: upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-x64
          path: apps/frontend/src-tauri/target/release/bundle/appimage/*.AppImage

  build-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libudev-dev patchelf libfuse2

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: apps/frontend/src-tauri
          args: --target aarch64-unknown-linux-gnu

      - name: upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-arm64
          path: apps/frontend/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
